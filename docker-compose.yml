services:
  app:
    build: .
    ports:
      - "3015:3000"
    depends_on:
      - dynamodb
      - redis
      - prometheus
      - grafana
 
  dynamodb:
    image: amazon/dynamodb-local
    container_name: nestjs-redis-pub-sub
    volumes:
      - dynamodb_data:/home/dynamodblocal/data # Data persistence
    ports:
      - "8000:8000" # Access port
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data/"

  redis:
    image: redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3010:3000"

volumes:
  dynamodb_data:
